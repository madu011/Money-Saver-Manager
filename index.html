<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MoneySaver</title>

  <!-- Dynamic Web Icon & PWA Integration -->
  <link rel="icon" type="image/png" href="1784723411245~2 (1).png">
  <link rel="apple-touch-icon" href="1784723411245~2 (1).png">
  <meta name="theme-color" content="#0a0a0c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    /* --- CSS RESET & VARIABLES --- */
    :root {
      --bg-color: #0a0a0c;
      --card-bg: #141419;
      --card-border: #22222a;
      --text-main: #ffffff;
      --text-muted: #8e8e93;
      --accent-green: #2ecc71;
      --accent-red: #e74c3c;
      --nav-bg: #121217;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      padding-bottom: 90px; /* Space for floating nav */
    }

    /* --- HEADER --- */
    header {
      padding: 20px 24px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--card-border);
      background: rgba(10, 10, 12, 0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      object-fit: cover;
    }

    .brand h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* --- PANELS & VIEWS --- */
    main {
      padding: 20px;
      flex: 1;
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
    }

    .panel {
      display: none;
      animation: fadeIn 0.25s ease-in-out;
    }

    .panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- DASHBOARD PANEL --- */
    .dashboard-hero {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 32px 20px;
      text-align: center;
      margin-top: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .balance-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .balance-amount {
      font-size: 2.75rem;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -1px;
      margin-bottom: 16px;
    }

    .analytics-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .analytic-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .percent-green { color: var(--accent-green); }
    .percent-red { color: var(--accent-red); }

    /* --- CARDS & FORM ELEMENTS --- */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-control {
      width: 100%;
      padding: 14px 16px;
      background: #0f0f13;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: var(--text-main);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-control:focus {
      border-color: #444455;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-income {
      background: var(--accent-green);
      color: #000;
    }

    .btn-spend {
      background: var(--accent-red);
      color: #fff;
    }

    .btn-neutral {
      background: #2a2a35;
      color: #fff;
    }

    /* --- HISTORY PANEL --- */
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .transaction-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .transaction-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .transaction-item:hover {
      background: #1a1a22;
    }

    .tx-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 65%;
    }

    .tx-note {
      color: var(--text-main) !important; /* Strict white text for notes */
      font-weight: 500;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tx-date {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .tx-amount {
      font-size: 1.05rem;
      font-weight: 700;
      text-align: right;
    }

    .tx-amount.income { color: var(--accent-green); }
    .tx-amount.expense { color: var(--accent-red); }

    /* --- CONVERTER PANEL --- */
    .converted-box {
      text-align: center;
      padding: 20px;
      background: #0f0f13;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      margin-top: 10px;
    }

    .converted-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent-green);
      margin-top: 6px;
    }

    /* --- FLOATING BOTTOM NAVIGATION --- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--nav-bg);
      border-top: 1px solid var(--card-border);
      display: flex;
      justify-content: space-around;
      padding: 12px 8px 24px; /* Extra bottom padding for iOS/Android nav bars */
      z-index: 100;
    }

    .nav-item {
      background: none;
      border: none;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      flex: 1;
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .nav-item.active {
      color: var(--text-main);
    }

    .nav-item.btn-add-inc { color: var(--accent-green); }
    .nav-item.btn-add-exp { color: var(--accent-red); }

    /* --- MODAL DIALOG --- */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 200;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .modal-body {
      color: var(--text-main);
      font-size: 0.95rem;
      line-height: 1.5;
      word-break: break-word;
      margin-bottom: 20px;
    }

    .modal-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--card-border);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <!-- TOP HEADER -->
  <header>
    <div class="brand">
      <img src="1784723411245~2 (1).png" alt="Logo" onerror="this.style.display='none'">
      <h1>MoneySaver</h1>
    </div>
  </header>

  <!-- MAIN CONTAINER FOR PANELS -->
  <main>

    <!-- 1. DASHBOARD PANEL -->
    <section id="panel-home" class="panel active">
      <div class="dashboard-hero">
        <div class="balance-title">Current Balance</div>
        <div class="balance-amount" id="dash-balance">0.00 RSD</div>
        
        <div class="analytics-row">
          <div class="analytic-item percent-green">
            <span>▲</span>
            <span id="dash-inc-pct">0%</span>
            <span style="color: var(--text-muted); font-size: 0.75rem;">Income</span>
          </div>
          <div style="color: var(--card-border);">|</div>
          <div class="analytic-item percent-red">
            <span>▼</span>
            <span id="dash-exp-pct">0%</span>
            <span style="color: var(--text-muted); font-size: 0.75rem;">Expense</span>
          </div>
        </div>
      </div>
    </section>

    <!-- 2. ADD INCOME PANEL -->
    <section id="panel-add-income" class="panel">
      <div class="card">
        <h2 class="card-title" style="color: var(--accent-green);">Add Income (+)</h2>
        <form id="form-income">
          <div class="form-group">
            <label>Amount (RSD)</label>
            <input type="number" step="0.01" class="form-control" id="inc-amount" placeholder="0.00" required>
          </div>
          <div class="form-group">
            <label>Note / Description</label>
            <input type="text" class="form-control" id="inc-note" placeholder="Salary, Bonus, Side project..." required>
          </div>
          <div class="form-group">
            <label>Date & Time</label>
            <input type="datetime-local" class="form-control" id="inc-date" required>
          </div>
          <button type="submit" class="btn btn-income">Save Income</button>
        </form>
      </div>
    </section>

    <!-- 3. SPEND PANEL -->
    <section id="panel-add-spend" class="panel">
      <div class="card">
        <h2 class="card-title" style="color: var(--accent-red);">Spend Money (-)</h2>
        <form id="form-spend">
          <div class="form-group">
            <label>Amount (RSD)</label>
            <input type="number" step="0.01" class="form-control" id="exp-amount" placeholder="0.00" required>
          </div>
          <div class="form-group">
            <label>Note / Description</label>
            <input type="text" class="form-control" id="exp-note" placeholder="Groceries, Rent, Utilities..." required>
          </div>
          <div class="form-group">
            <label>Date & Time</label>
            <input type="datetime-local" class="form-control" id="exp-date" required>
          </div>
          <button type="submit" class="btn btn-spend">Record Expense</button>
        </form>
      </div>
    </section>

    <!-- 4. HISTORY PANEL -->
    <section id="panel-history" class="panel">
      <div class="filter-bar">
        <select class="form-control" id="filter-type" onchange="renderHistory()">
          <option value="ALL">All Types</option>
          <option value="INCOME">Income Only (+)</option>
          <option value="EXPENSE">Expense Only (-)</option>
        </select>
        <input type="date" class="form-control" id="filter-date" onchange="renderHistory()">
      </div>

      <div class="transaction-list" id="tx-container">
        <!-- Records injected here -->
      </div>
    </section>

    <!-- 5. CURRENCY RATES PANEL -->
    <section id="panel-rates" class="panel">
      <div class="card">
        <h2 class="card-title">Live Rate Configuration</h2>
        <div class="form-group">
          <label>Manual Exchange Rate (1 RSD = ? LKR)</label>
          <input type="number" step="0.0001" class="form-control" id="exchange-rate-input" placeholder="e.g. 2.75">
        </div>
        <button class="btn btn-neutral" onclick="saveExchangeRate()">Update Rate</button>
      </div>

      <div class="card">
        <h2 class="card-title">Total Balance in LKR</h2>
        <div class="converted-box">
          <div style="color: var(--text-muted); font-size: 0.8rem;">CONVERTED VALUE</div>
          <div class="converted-value" id="lkr-balance-display">0.00 LKR</div>
        </div>
      </div>

      <div class="card">
        <h2 class="card-title">Custom Calculator</h2>
        <div class="form-group">
          <label>Amount in RSD</label>
          <input type="number" step="0.01" class="form-control" id="calc-rsd" placeholder="0.00" oninput="calculateConversion()">
        </div>
        <div class="converted-box">
          <div style="color: var(--text-muted); font-size: 0.8rem;">EQUIVALENT IN LKR</div>
          <div class="converted-value" id="calc-lkr-result">0.00 LKR</div>
        </div>
      </div>
    </section>

  </main>

  <!-- DETAIL MODAL FOR LONG NOTES -->
  <div class="modal-overlay" id="tx-modal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title" id="modal-type-title">Transaction Details</div>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div style="margin-bottom: 12px; font-weight: 700; font-size: 1.4rem;" id="modal-amount"></div>
      <div class="modal-body" id="modal-note-body"></div>
      <div class="modal-meta" id="modal-timestamp"></div>
      <button class="btn btn-neutral" style="margin-top: 16px;" onclick="deleteCurrentTx()">Delete Record</button>
    </div>
  </div>

  <!-- FIXED BOTTOM NAVIGATION BAR -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchPanel('home', this)">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Home
    </button>
    <button class="nav-item btn-add-inc" onclick="switchPanel('add-income', this)">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Income
    </button>
    <button class="nav-item btn-add-exp" onclick="switchPanel('add-spend', this)">
      <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
      Spend
    </button>
    <button class="nav-item" onclick="switchPanel('history', this)">
      <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      History
    </button>
    <button class="nav-item" onclick="switchPanel('rates', this)">
      <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
      Rates
    </button>
  </nav>

  <!-- JAVASCRIPT APPLICATION LOGIC -->
  <script>
    /* --- STATE MANAGEMENT & LOCAL STORAGE --- */
    let transactions = JSON.parse(localStorage.getItem('ms_transactions')) || [];
    let exchangeRate = parseFloat(localStorage.getItem('ms_exchange_rate')) || 2.75; // Default rate RSD to LKR
    let activeModalTxId = null;

    // Initialize Default Dates to Now
    function resetFormDates() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      const formatted = now.toISOString().slice(0, 16);
      document.getElementById('inc-date').value = formatted;
      document.getElementById('exp-date').value = formatted;
    }

    /* --- NAVIGATION SYSTEM --- */
    function switchPanel(panelId, element) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

      document.getElementById(`panel-${panelId}`).classList.add('active');
      if (element) element.classList.add('active');

      if (panelId === 'history') renderHistory();
      if (panelId === 'rates') updateRatesPanel();
      if (panelId === 'home') updateDashboard();
    }

    /* --- CALCULATIONS & DASHBOARD --- */
    function updateDashboard() {
      let totalIncome = 0;
      let totalExpense = 0;

      transactions.forEach(t => {
        if (t.type === 'INCOME') totalIncome += t.amount;
        if (t.type === 'EXPENSE') totalExpense += t.amount;
      });

      const balance = totalIncome - totalExpense;
      document.getElementById('dash-balance').textContent = `${balance.toFixed(2)} RSD`;

      // Calculate Ratios
      const combinedTotal = totalIncome + totalExpense;
      let incPct = 0;
      let expPct = 0;

      if (combinedTotal > 0) {
        incPct = Math.round((totalIncome / combinedTotal) * 100);
        expPct = Math.round((totalExpense / combinedTotal) * 100);
      }

      document.getElementById('dash-inc-pct').textContent = `${incPct}%`;
      document.getElementById('dash-exp-pct').textContent = `${expPct}%`;
    }

    /* --- FORM SUBMISSIONS --- */
    document.getElementById('form-income').addEventListener('submit', (e) => {
      e.preventDefault();
      addTransaction('INCOME', 'inc-amount', 'inc-note', 'inc-date');
    });

    document.getElementById('form-spend').addEventListener('submit', (e) => {
      e.preventDefault();
      addTransaction('EXPENSE', 'exp-amount', 'exp-note', 'exp-date');
    });

    function addTransaction(type, amountId, noteId, dateId) {
      const amount = parseFloat(document.getElementById(amountId).value);
      const note = document.getElementById(noteId).value.trim();
      const dateVal = document.getElementById(dateId).value;

      if (!amount || !note || !dateVal) return;

      const newTx = {
        id: Date.now().toString(),
        type,
        amount,
        note,
        date: dateVal
      };

      transactions.unshift(newTx);
      saveState();

      // Reset Forms
      document.getElementById(amountId).value = '';
      document.getElementById(noteId).value = '';
      resetFormDates();

      // Return to Home Panel
      updateDashboard();
      switchPanel('home', document.querySelectorAll('.nav-item')[0]);
    }

    /* --- HISTORY & LONG NOTE HANDLING --- */
    function renderHistory() {
      const container = document.getElementById('tx-container');
      const filterType = document.getElementById('filter-type').value;
      const filterDate = document.getElementById('filter-date').value;

      let filtered = transactions;

      if (filterType !== 'ALL') {
        filtered = filtered.filter(t => t.type === filterType);
      }

      if (filterDate) {
        filtered = filtered.filter(t => t.date.startsWith(filterDate));
      }

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state">No transaction records found.</div>`;
        return;
      }

      container.innerHTML = filtered.map(t => {
        const isInc = t.type === 'INCOME';
        const formattedDate = new Date(t.date).toLocaleString([], {
          year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        return `
          <div class="transaction-item" onclick="openModal('${t.id}')">
            <div class="tx-info">
              <div class="tx-note">${escapeHtml(t.note)}</div>
              <div class="tx-date">${formattedDate}</div>
            </div>
            <div class="tx-amount ${isInc ? 'income' : 'expense'}">
              ${isInc ? '+' : '-'}${t.amount.toFixed(2)}
            </div>
          </div>
        `;
      }).join('');
    }

    /* --- MODAL DIALOG MANAGEMENT --- */
    function openModal(id) {
      const tx = transactions.find(t => t.id === id);
      if (!tx) return;

      activeModalTxId = id;
      const isInc = tx.type === 'INCOME';

      document.getElementById('modal-type-title').textContent = isInc ? 'Income Record' : 'Expense Record';
      document.getElementById('modal-amount').textContent = `${isInc ? '+' : '-'}${tx.amount.toFixed(2)} RSD`;
      document.getElementById('modal-amount').style.color = isInc ? 'var(--accent-green)' : 'var(--accent-red)';
      document.getElementById('modal-note-body').textContent = tx.note;
      document.getElementById('modal-timestamp').textContent = `Recorded on: ${new Date(tx.date).toLocaleString()}`;

      document.getElementById('tx-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('tx-modal').classList.remove('active');
      activeModalTxId = null;
    }

    function deleteCurrentTx() {
      if (!activeModalTxId) return;
      transactions = transactions.filter(t => t.id !== activeModalTxId);
      saveState();
      closeModal();
      renderHistory();
      updateDashboard();
    }

    /* --- CONVERTER & CURRENCY LOGIC --- */
    function updateRatesPanel() {
      document.getElementById('exchange-rate-input').value = exchangeRate;
      
      let totalIncome = 0;
      let totalExpense = 0;
      transactions.forEach(t => {
        if (t.type === 'INCOME') totalIncome += t.amount;
        if (t.type === 'EXPENSE') totalExpense += t.amount;
      });
      
      const balanceRSD = totalIncome - totalExpense;
      const balanceLKR = balanceRSD * exchangeRate;
      
      document.getElementById('lkr-balance-display').textContent = `${balanceLKR.toFixed(2)} LKR`;
      calculateConversion();
    }

    function saveExchangeRate() {
      const val = parseFloat(document.getElementById('exchange-rate-input').value);
      if (val && val > 0) {
        exchangeRate = val;
        localStorage.setItem('ms_exchange_rate', exchangeRate);
        updateRatesPanel();
        alert('Exchange rate updated successfully!');
      }
    }

    function calculateConversion() {
      const rsd = parseFloat(document.getElementById('calc-rsd').value) || 0;
      const lkr = rsd * exchangeRate;
      document.getElementById('calc-lkr-result').textContent = `${lkr.toFixed(2)} LKR`;
    }

    /* --- UTILS --- */
    function saveState() {
      localStorage.setItem('ms_transactions', JSON.stringify(transactions));
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // INITIALIZATION
    window.addEventListener('DOMContentLoaded', () => {
      resetFormDates();
      updateDashboard();
    });
  </script>
</body>
</html>
