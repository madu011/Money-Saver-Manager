<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneySaver</title>
  
  <!-- App Icons & PWA Config -->
  <link rel="icon" type="image/png" href="1784723411245~2 (1).png">
  <link rel="apple-touch-icon" href="1784723411245~2 (1).png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <style>
    :root {
      --bg: #0a0a0a;
      --card-bg: #141414;
      --border: #262626;
      --text-main: #ffffff;
      --text-muted: #888888;
      --green: #22c55e;
      --red: #ef4444;
      --accent-white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 70px;
    }

    /* Top Header */
    header {
      padding: 16px;
      text-align: center;
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .app-title {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .currency-badge {
      font-size: 0.75rem;
      background: #222;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    /* Tab Panels */
    .panel {
      display: none;
      padding: 20px;
      animation: fadeIn 0.2s ease-in-out;
    }

    .panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Main Balance Card */
    .balance-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px 20px;
      text-align: center;
      margin-top: 20px;
    }

    .balance-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .balance-amount {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 20px;
    }

    .stats-row {
      display: flex;
      justify-content: space-around;
      border-top: 1px solid var(--border);
      padding-top: 15px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .stat-green { color: var(--green); }
    .stat-red { color: var(--red); }

    /* Forms & Inputs */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-main);
      font-size: 1rem;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #555;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      background: #ffffff;
      color: #000000;
      margin-top: 10px;
    }

    /* History List */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }

    .history-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .history-info {
      max-width: 65%;
    }

    .history-note {
      font-size: 0.95rem;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .history-amount {
      font-weight: 700;
      font-size: 1.05rem;
    }

    /* Convertor Panel Cards */
    .calc-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 15px;
    }

    .calc-title {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .calc-result {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-main);
    }

    /* Footer Branding */
    footer {
      text-align: center;
      padding: 20px 0;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      margin-top: auto;
    }

    /* Bottom Nav Bar */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: rgba(15, 15, 15, 0.9);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      z-index: 100;
    }

    .nav-item {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.7rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      width: 20%;
    }

    .nav-item.active {
      color: var(--text-main);
    }

    .nav-icon {
      font-size: 1.2rem;
    }

    /* Modal Popup for Notes */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      z-index: 200;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 400px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .full-note {
      color: var(--text-main);
      font-size: 1rem;
      line-height: 1.5;
      word-break: break-word;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <!-- App Header -->
  <header>
    <div class="app-title">MoneySaver</div>
    <div class="currency-badge">RSD Main</div>
  </header>

  <!-- Panel 1: Home / Balance -->
  <div id="home-panel" class="panel active">
    <div class="balance-card">
      <div class="balance-label">Total Balance</div>
      <div class="balance-amount" id="main-balance">0.00 RSD</div>
      
      <div class="stats-row">
        <div class="stat-item stat-green">
          <span>▲</span> <span id="income-pct">0%</span> Income
        </div>
        <div class="stat-item stat-red">
          <span>▼</span> <span id="expense-pct">0%</span> Spend
        </div>
      </div>
    </div>
  </div>

  <!-- Panel 2: Add Income -->
  <div id="income-panel" class="panel">
    <h3>Add Income (+)</h3>
    <br>
    <form id="income-form">
      <div class="form-group">
        <label>Amount (RSD)</label>
        <input type="number" id="inc-amount" step="any" placeholder="0.00" required>
      </div>
      <div class="form-group">
        <label>Note / Description (Required)</label>
        <textarea id="inc-note" rows="3" placeholder="Where did you earn this?" required></textarea>
      </div>
      <div class="form-group">
        <label>Date & Time</label>
        <input type="datetime-local" id="inc-date" required>
      </div>
      <button type="submit" class="btn" style="background: var(--green); color: #fff;">Save Income</button>
    </form>
  </div>

  <!-- Panel 3: Add Spend -->
  <div id="spend-panel" class="panel">
    <h3>Add Expense (-)</h3>
    <br>
    <form id="spend-form">
      <div class="form-group">
        <label>Amount (RSD)</label>
        <input type="number" id="exp-amount" step="any" placeholder="0.00" required>
      </div>
      <div class="form-group">
        <label>Note / Description (Required)</label>
        <textarea id="exp-note" rows="3" placeholder="What was this spent on?" required></textarea>
      </div>
      <div class="form-group">
        <label>Date & Time</label>
        <input type="datetime-local" id="exp-date" required>
      </div>
      <button type="submit" class="btn" style="background: var(--red); color: #fff;">Save Expense</button>
    </form>
  </div>

  <!-- Panel 4: History -->
  <div id="history-panel" class="panel">
    <h3>Transaction History</h3>
    <br>
    <div class="form-group">
      <input type="date" id="history-filter" onchange="renderHistory()">
    </div>
    <div class="history-list" id="history-container">
      <!-- Items dynamically added here -->
    </div>
  </div>

  <!-- Panel 5: Currency Converter -->
  <div id="rates-panel" class="panel">
    <h3>RSD to LKR Rates</h3>
    <br>
    <div class="calc-card">
      <div class="form-group">
        <label>1 RSD = ? LKR (Manual Rate Set)</label>
        <input type="number" id="exchange-rate" step="any" placeholder="e.g. 2.85" oninput="saveRate()">
      </div>
    </div>

    <div class="calc-card">
      <div class="calc-title">Main Balance in Sri Lankan Rupees</div>
      <div class="calc-result" id="lkr-total-balance">0.00 LKR</div>
    </div>

    <div class="calc-card">
      <div class="calc-title">Custom Custom Converter</div>
      <div class="form-group">
        <input type="number" id="custom-rsd" placeholder="Enter RSD Amount" oninput="calcCustom()">
      </div>
      <div class="calc-result" id="custom-lkr-result">0.00 LKR</div>
    </div>
  </div>

  <!-- Footer Branding -->
  <footer>
    Made by Madhuranga Yasanath
  </footer>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('home-panel', this)">
      <span class="nav-icon">💳</span>
      <span>Home</span>
    </button>
    <button class="nav-item" onclick="switchTab('income-panel', this)">
      <span class="nav-icon">📈</span>
      <span>Add</span>
    </button>
    <button class="nav-item" onclick="switchTab('spend-panel', this)">
      <span class="nav-icon">📉</span>
      <span>Spend</span>
    </button>
    <button class="nav-item" onclick="switchTab('history-panel', this)">
      <span class="nav-icon">📜</span>
      <span>History</span>
    </button>
    <button class="nav-item" onclick="switchTab('rates-panel', this)">
      <span class="nav-icon">💱</span>
      <span>Rates</span>
    </button>
  </nav>

  <!-- Note Details Modal -->
  <div class="modal" id="note-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h4 id="modal-type">Details</h4>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="full-note" id="modal-note"></div>
      <div style="font-size: 0.8rem; color: var(--text-muted);" id="modal-date"></div>
      <div style="font-size: 1.2rem; font-weight: 700; margin-top: 10px;" id="modal-amount"></div>
    </div>
  </div>

  <script>
    // LocalStorage Setup
    let transactions = JSON.parse(localStorage.getItem('ms_transactions')) || [];
    let rsdRate = parseFloat(localStorage.getItem('ms_rsd_rate')) || 0;

    // Set Default Datetime
    function setNowDate() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      const formatted = now.toISOString().slice(0,16);
      document.getElementById('inc-date').value = formatted;
      document.getElementById('exp-date').value = formatted;
    }

    // Switch Tabs
    function switchTab(panelId, btnElement) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById(panelId).classList.add('active');
      btnElement.classList.add('active');
      if(panelId === 'home-panel') updateDashboard();
      if(panelId === 'history-panel') renderHistory();
      if(panelId === 'rates-panel') updateRatesPanel();
    }

    // Add Income
    document.getElementById('income-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const amount = parseFloat(document.getElementById('inc-amount').value);
      const note = document.getElementById('inc-note').value;
      const date = document.getElementById('inc-date').value;

      transactions.push({ id: Date.now(), type: 'income', amount, note, date });
      saveData();
      e.target.reset();
      setNowDate();
      alert('Income added!');
      switchTab('home-panel', document.querySelectorAll('.nav-item')[0]);
    });

    // Add Spend
    document.getElementById('spend-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const amount = parseFloat(document.getElementById('exp-amount').value);
      const note = document.getElementById('exp-note').value;
      const date = document.getElementById('exp-date').value;

      transactions.push({ id: Date.now(), type: 'spend', amount, note, date });
      saveData();
      e.target.reset();
      setNowDate();
      alert('Expense recorded!');
      switchTab('home-panel', document.querySelectorAll('.nav-item')[0]);
    });

    // Calculate Balance & Analysis
    function updateDashboard() {
      let totalIncome = 0;
      let totalSpend = 0;

      transactions.forEach(t => {
        if(t.type === 'income') totalIncome += t.amount;
        if(t.type === 'spend') totalSpend += t.amount;
      });

      const mainBalance = totalIncome - totalSpend;
      document.getElementById('main-balance').innerText = `${mainBalance.toFixed(2)} RSD`;

      const totalFlow = totalIncome + totalSpend;
      const incPct = totalFlow > 0 ? Math.round((totalIncome / totalFlow) * 100) : 0;
      const expPct = totalFlow > 0 ? Math.round((totalSpend / totalFlow) * 100) : 0;

      document.getElementById('income-pct').innerText = `${incPct}%`;
      document.getElementById('expense-pct').innerText = `${expPct}%`;
    }

    // Render History List
    function renderHistory() {
      const container = document.getElementById('history-container');
      const filterDate = document.getElementById('history-filter').value;
      container.innerHTML = '';

      let filtered = transactions;
      if(filterDate) {
        filtered = transactions.filter(t => t.date.startsWith(filterDate));
      }

      filtered.sort((a,b) => new Date(b.date) - new Date(a.date));

      if(filtered.length === 0) {
        container.innerHTML = `<div style="text-align:center; color: var(--text-muted); padding:20px;">No transactions found.</div>`;
        return;
      }

      filtered.forEach(t => {
        const isInc = t.type === 'income';
        const item = document.createElement('div');
        item.className = 'history-item';
        item.onclick = () => openModal(t);

        item.innerHTML = `
          <div class="history-info">
            <div class="history-note">${t.note}</div>
            <div class="history-date">${t.date.replace('T', ' ')}</div>
          </div>
          <div class="history-amount ${isInc ? 'stat-green' : 'stat-red'}">
            ${isInc ? '+' : '-'} ${t.amount.toFixed(2)}
          </div>
        `;
        container.appendChild(item);
      });
    }

    // Modal Details
    function openModal(t) {
      const isInc = t.type === 'income';
      document.getElementById('modal-type').innerText = isInc ? 'Income Record' : 'Expense Record';
      document.getElementById('modal-note').innerText = t.note;
      document.getElementById('modal-date').innerText = `Date: ${t.date.replace('T', ' ')}`;
      const amtEl = document.getElementById('modal-amount');
      amtEl.innerText = `${isInc ? '+' : '-'} ${t.amount.toFixed(2)} RSD`;
      amtEl.className = isInc ? 'stat-green' : 'stat-red';
      document.getElementById('note-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('note-modal').style.display = 'none';
    }

    // Save & Currency Calculation
    function saveRate() {
      rsdRate = parseFloat(document.getElementById('exchange-rate').value) || 0;
      localStorage.setItem('ms_rsd_rate', rsdRate);
      updateRatesPanel();
    }

    function updateRatesPanel() {
      document.getElementById('exchange-rate').value = rsdRate || '';
      let totalIncome = 0, totalSpend = 0;
      transactions.forEach(t => {
        if(t.type === 'income') totalIncome += t.amount;
        if(t.type === 'spend') totalSpend += t.amount;
      });
      const currentRsd = totalIncome - totalSpend;
      const lkrVal = currentRsd * rsdRate;
      document.getElementById('lkr-total-balance').innerText = `${lkrVal.toFixed(2)} LKR`;
      calcCustom();
    }

    function calcCustom() {
      const customRsd = parseFloat(document.getElementById('custom-rsd').value) || 0;
      const lkrRes = customRsd * rsdRate;
      document.getElementById('custom-lkr-result').innerText = `${lkrRes.toFixed(2)} LKR`;
    }

    function saveData() {
      localStorage.setItem('ms_transactions', JSON.stringify(transactions));
      updateDashboard();
    }

    // Initial Load
    setNowDate();
    updateDashboard();
  </script>
</body>
</html>
